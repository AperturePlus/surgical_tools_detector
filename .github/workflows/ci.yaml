name: CI/CD

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']
  pull_request:

env:
  ORT_VERSION: "1.24.3"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Export the PyTorch model (v8s.pt) to ONNX on a Linux runner.
  # A single fp32 ONNX model is produced and shared by all three build variants.
  # (fp16 ONNX requires C++ tensor-type changes; use --backend all locally to
  #  also generate best_fp16.onnx for advanced experimentation.)
  # ─────────────────────────────────────────────────────────────────────────────
  export-model:
    name: Export model (v8s.pt → best.onnx)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-export.txt

      - name: Install export dependencies
        run: pip install -r requirements-export.txt

      - name: Export fp32 ONNX (used by cpu, cuda, and directml builds)
        run: python scripts/export_model.py --model assets/v8s.pt --backend cpu

      - name: Upload ONNX model artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx-model
          path: assets/best.onnx
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Build & test on every push / pull-request.
  # On a tag push, also package the binary and upload it as a workflow artifact.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (Windows / MinGW-w64 / ${{ matrix.backend }})
    runs-on: windows-latest
    needs: export-model
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU-only build: standard ONNX Runtime, no GPU provider
          - backend: cpu
            ort_pkg: "onnxruntime-win-x64"
            cmake_ep_flags: "-DWITH_CUDA=OFF -DWITH_DIRECTML=OFF"
          # CUDA build: ORT GPU package, CUDA Execution Provider
          - backend: cuda
            ort_pkg: "onnxruntime-win-x64-gpu"
            cmake_ep_flags: "-DWITH_CUDA=ON -DWITH_DIRECTML=OFF"
          # DirectML build: ORT DirectML package, for AMD/Intel/NVIDIA on Windows
          - backend: directml
            ort_pkg: "onnxruntime-win-x64"
            cmake_ep_flags: "-DWITH_CUDA=OFF -DWITH_DIRECTML=ON"

    permissions:
      contents: read

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      # Download the ONNX model produced by the export-model job.
      - name: Download ONNX model artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: onnx-model
          path: assets

      # Install MSYS2 + all MinGW-w64 packages needed to compile the project.
      # pacboy uses the ":p" suffix as shorthand for "mingw-w64-x86_64-".
      - name: Set up MSYS2 / MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: unzip
          pacboy: >-
            cmake:p
            ninja:p
            opencv:p
            qt6-base:p
            gcc:p
            tools-git:p

      # Download the bundled ONNX Runtime release and generate the MinGW
      # import library (libonnxruntime.a) that CMakeLists.txt expects.
      - name: Download and prepare ONNX Runtime (${{ matrix.backend }})
        run: |
          ORT_PKG="${{ matrix.ort_pkg }}"
          ORT_DIR="${ORT_PKG}-${ORT_VERSION}"
          ORT_ZIP="${ORT_DIR}.zip"
          curl -fsSL -o "${ORT_ZIP}" \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${ORT_ZIP}"
          mkdir -p deps
          if command -v unzip >/dev/null 2>&1; then
            unzip -q "${ORT_ZIP}" -d deps/
          else
            tar -xf "${ORT_ZIP}" -C deps/
          fi
          cd "deps/${ORT_DIR}/lib"
          gendef onnxruntime.dll
          dlltool -d onnxruntime.def -D onnxruntime.dll -l libonnxruntime.a

      - name: Configure (${{ matrix.backend }})
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            ${{ matrix.cmake_ep_flags }}

      - name: Build
        run: cmake --build build

      # ── Packaging (tag pushes only) ──────────────────────────────────────────
      - name: Package release artifact (${{ matrix.backend }})
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $backend = "${{ matrix.backend }}"
          $out     = "SGTDetector-$tag-windows-x64-$backend"
          New-Item -ItemType Directory -Force $out | Out-Null

          # The cmake POST_BUILD ldd-based deployment already copied every
          # required DLL (MinGW runtime, OpenCV, ONNX Runtime, Qt6, …) into
          # the build directory.  Just mirror the whole build output.
          Copy-Item build\SGTDetector.exe $out\
          Get-ChildItem build\*.dll -ErrorAction SilentlyContinue |
              Copy-Item -Destination $out\
          Copy-Item build\best.onnx   $out\
          Copy-Item build\labels.dict $out\

          # Copy any Qt6 plugin sub-directories (platforms, imageformats, styles, …)
          # that windeployqt6 may have created in the build tree.
          $qt6PluginDirs = @('platforms','imageformats','styles','iconengines','sqldrivers','tls')
          foreach ($dir in $qt6PluginDirs) {
              if (Test-Path "build\$dir") {
                  Copy-Item "build\$dir" $out\ -Recurse
              }
          }
          Compress-Archive -Path $out -DestinationPath "$out.zip"

      - name: Upload release artifact (${{ matrix.backend }})
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-${{ matrix.backend }}
          path: SGTDetector-${{ github.ref_name }}-windows-x64-${{ matrix.backend }}.zip

  # ─────────────────────────────────────────────────────────────────────────────
  # Create a GitHub Release and attach all three packaged binaries.
  # Runs only when the push that triggered this workflow is a version tag.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      # Use >= 4.1.3 to avoid the arbitrary-file-write vulnerability (GHSA-…)
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          pattern: windows-x64-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
